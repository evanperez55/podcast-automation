name: Daily Fake Problem

on:
  schedule:
    # Every day at 12:00 PM ET (7 PM posting is ~peak engagement,
    # but we generate at noon to allow manual review if needed)
    - cron: "0 16 * * *"  # 4 PM UTC = 12 PM ET
  workflow_dispatch:  # Manual trigger for testing

jobs:
  post-daily-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --no-dev --extra daily

      - name: Generate and post daily content
        env:
          DAILY_CONTENT_ENABLED: "true"
          DAILY_CONTENT_USE_OPENAI: "true"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: uv run python post_daily_content.py

      - name: Upload content log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-content-${{ github.run_number }}
          path: output/daily_content/
          retention-days: 30
