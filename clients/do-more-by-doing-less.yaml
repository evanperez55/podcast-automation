client_name: "do-more-by-doing-less"
podcast_name: "Do More By Doing Less"

# Branding — client logo for thumbnails, audiograms, subtitle clips
# Download from RSS artwork or provide a local path
branding:
  logo_path: "clients/do-more-by-doing-less/logo.png"

# RSS-based ingest (no Dropbox needed)
episode_source: "rss"

rss_source:
  feed_url: "https://www.spreaker.com/show/5917958/episodes/feed"
  episode_index: 0  # 0 = latest episode

# YouTube video source — downloads video for stacked speaker view clips
# layout: split (side-by-side speakers like Zoom) or auto (blurred background)
video_source:
  youtube_channel: null  # No confirmed YouTube channel — audio-only clips for now
  layout: "auto"

dropbox:
  folder_path: null
  finished_folder: null
  edited_folder: null
  app_key: null
  app_secret: null
  refresh_token: null

youtube:
  client_id: null
  client_secret: null
  token_pickle: "clients/do-more-by-doing-less/youtube_token.pickle"

twitter:
  api_key: null
  api_secret: null
  access_token: null
  access_secret: null

instagram:
  access_token: null
  account_id: null

tiktok:
  client_key: null
  client_secret: null
  access_token: null

discord:
  webhook_url: null

content:
  num_clips: 3
  clip_min_duration: 15
  clip_max_duration: 60
  names_to_remove: []
  words_to_censor: []
  voice_persona: |
    You are analyzing a solo business/productivity podcast hosted by Charles Alexander.
    The show focuses on practical advice for solopreneurs about habits, productivity,
    and doing less to achieve more. Tone is conversational, motivational, and direct.
  scoring_profile:
    description: "a solopreneur productivity podcast about doing less to achieve more"
    criteria:
      - name: "Actionability"
        key: "actionability"
        max: 3
        description: "How actionable is the advice for a solopreneur?"
      - name: "Relatability"
        key: "relatability"
        max: 3
        description: "How relatable is this to small business owners?"
      - name: "Shareability"
        key: "shareability"
        max: 2
        description: "Would someone share this clip on social media?"
      - name: "Hook Strength"
        key: "hook_strength"
        max: 2
        description: "Does it grab attention in the first few seconds?"
    style:
      - "Practical, no-nonsense productivity advice"
      - "Conversational and motivational tone"
    high_examples:
      - '"Stop trying to do everything — here''s the one thing that actually moves the needle"'
    low_examples:
      - "Generic motivational quotes with no specific advice"
    categories: ["productivity", "habits", "mindset", "solopreneur", "business"]
  blog_voice: |
    Write in a direct, practical tone that matches Charles Alexander's style.
    Focus on actionable takeaways the reader can implement today.
    BAD: "In this episode, Charles delves into the intricacies of..."
    GOOD: "Here's the one habit change that actually sticks — and why."

rss:
  description: "Practical advice for solopreneurs who want to achieve more by doing less."
  author: "Charles Alexander"
  email: "charles@yourcharlesalexander.com"
  website_url: "https://www.yourcharlesalexander.com"
  artwork_url: null
  language: "en-us"
  explicit: false
  categories: ["Business", "Entrepreneurship"]
