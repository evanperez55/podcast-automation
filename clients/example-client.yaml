# Example client config template
# Copy this file and rename to your-client-name.yaml
# Set null for any value that should fall back to environment variables.
# Usage: python main.py latest --client your-client-name

client_name: "your-client-name"
podcast_name: "Your Podcast Name"

# Episode source: where to download audio from (dropbox | rss | local)
# Default is "dropbox" — set to "rss" to download from a podcast RSS feed.
episode_source: "dropbox"  # Change to "rss" for RSS-based ingest

# RSS source settings — only required when episode_source is "rss"
# rss_source:
#   feed_url: "https://feeds.example.com/your-show.xml"  # Your RSS feed URL
#   episode_index: 0  # 0 = latest, 1 = second newest, etc.

dropbox:
  folder_path: "/Your Podcast/raw_files"
  finished_folder: "/Your Podcast/finished_files"
  edited_folder: "/Your Podcast/edited_files"
  app_key: null          # Set here or use DROPBOX_APP_KEY env var
  app_secret: null       # Set here or use DROPBOX_APP_SECRET env var
  refresh_token: null    # Set here or use DROPBOX_REFRESH_TOKEN env var

youtube:
  client_id: null        # Set here or use YOUTUBE_CLIENT_ID env var
  client_secret: null    # Set here or use YOUTUBE_CLIENT_SECRET env var
  token_pickle: "clients/your-client-name/youtube_token.pickle"

twitter:
  api_key: null
  api_secret: null
  access_token: null
  access_secret: null

instagram:
  access_token: null
  account_id: null

tiktok:
  client_key: null
  client_secret: null
  access_token: null

discord:
  webhook_url: null

content:
  num_clips: 3
  clip_min_duration: 15
  clip_max_duration: 30
  names_to_remove: []    # First names/full names of hosts to censor
  words_to_censor: []    # Slurs/words to beep out (matched case-insensitive)
  voice_persona: null    # Custom GPT-4o persona prompt, or null for default
  # scoring_profile:     # Custom topic scoring criteria, or omit for comedy defaults
  #   description: "a true crime podcast exploring unsolved mysteries"
  #   criteria:
  #     - name: "Mystery Factor"
  #       key: "mystery_factor"
  #       max: 3
  #       description: "How mysterious or unsolved is this?"
  #     - name: "Public Interest"
  #       key: "public_interest"
  #       max: 3
  #       description: "How much does the general public care about this case?"
  #     - name: "Narrative Potential"
  #       key: "narrative_potential"
  #       max: 2
  #       description: "Can this be told as a compelling story?"
  #     - name: "Evidence Available"
  #       key: "evidence_available"
  #       max: 2
  #       description: "Is there enough evidence to discuss meaningfully?"
  #   style:
  #     - "Investigative deep-dives with respect for victims"
  #     - "Evidence-based analysis without speculation"
  #   high_examples:
  #     - '"The Somerton Man case just got DNA results after 70 years"'
  #   low_examples:
  #     - "Solved cases with no remaining mystery"
  #   categories: ["cold_case", "missing_person", "conspiracy", "forensic_science"]
  # blog_voice: |          # Custom blog writing voice, or omit for default
  #   Write this blog post in a professional but engaging tone.
  #   BAD: "In this episode, the hosts delve into..."
  #   GOOD: "Here's what we covered and why it matters."

rss:
  description: null        # Podcast description for RSS feed
  author: null             # Author name (defaults to podcast_name)
  email: null              # Contact email for RSS feed
  website_url: null        # Podcast website URL
  artwork_url: null        # Cover art URL (1400x1400+ recommended)
  language: "en-us"
  explicit: false
  categories: ["Society & Culture"]  # iTunes categories
