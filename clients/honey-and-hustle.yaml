content:
  num_clips: 3
  clip_min_duration: 15
  clip_max_duration: 60
  names_to_remove: []
  words_to_censor: []
  voice_persona: |
    You are analyzing an interview podcast hosted by Angela Hollowell called Honey & Hustle.
    The show features conversations with creative entrepreneurs, small business owners,
    and nonprofit founders. Tone is warm, genuine, and empowering. The audience is
    aspiring and current entrepreneurs, especially women and BIPOC creatives.
  scoring_profile:
    description: "an entrepreneurship interview podcast for creative business owners"
    criteria:
      - name: "Actionability"
        key: "actionability"
        max: 3
        description: "How actionable is the advice for a creative entrepreneur?"
      - name: "Storytelling"
        key: "storytelling"
        max: 3
        description: "How compelling is the founder's story?"
      - name: "Shareability"
        key: "shareability"
        max: 2
        description: "Would someone share this clip with their network?"
      - name: "Hook Strength"
        key: "hook_strength"
        max: 2
        description: "Does it grab attention in the first few seconds?"
    style:
      - "Warm, authentic founder stories"
      - "Practical business advice from real experience"
    high_examples:
      - '"I quit my job with $200 in my bank account and here''s what happened"'
    low_examples:
      - "Generic business advice with no personal story"
    categories: ["entrepreneurship", "creative_business", "founder_story", "small_business"]
  blog_voice: |
    Write in a warm, empowering tone that matches Angela Hollowell's style.
    Focus on the guest's journey and actionable lessons.
    BAD: "In this episode, Angela explores the multifaceted world of..."
    GOOD: "Here's how one founder turned a side hustle into a full-time creative business."

rss:
  description: "Conversations with creative entrepreneurs, small business owners, and nonprofit founders."
  author: "Angela Hollowell"
  email: "honeyandhustlerdu@gmail.com"
  website_url: "https://www.honeyandhustle.co/"
  artwork_url: "https://artwork.captivate.fm/6c802ca9-003e-44c9-8e78-7a772410c3f0/Podcast-Cover-Art-2026-8.jpg"
  language: "en-us"
  explicit: false
  categories: ["Business", "Entrepreneurship"]
